<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTA 4 Timas Edition</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body, html {
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        #start-screen {
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            padding: 20px; 
            z-index: 10;
        }
        
        #start-screen h1 {
            font-size: 22px; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
        }
        
        #download-btn {
            background-color: #28a745; 
            color: white; 
            border: none; 
            padding: 18px 50px; 
            font-size: 22px;
            font-weight: 800; 
            border-radius: 10px; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
            transition: transform 0.1s;
        }
        
        #download-btn:active { 
            transform: scale(0.95); 
        }

        #slideshow {
            display: none; 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            z-index: 5;
            background-color: #000;
        }
        
        .slide {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            object-fit: cover; 
            opacity: 0; 
            transition: opacity 1s ease-in-out; 
        }
        
        .slide.active { 
            opacity: 1; 
            animation: gtaPanEffect 6s linear forwards;
        }

        @keyframes gtaPanEffect {
            0% {
                object-position: 0% center; 
            }
            100% {
                object-position: 100% center; 
            }
        }

        #final-screen {
            display: none; 
            text-align: center; 
            padding: 20px; 
            z-index: 10;
        }
        
        #final-screen h2 {
            font-size: 20px; 
            font-weight: normal; 
            letter-spacing: 2px; 
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="muzik.mp3"></audio>

    <div id="start-screen">
        <h1>bedava gta 4 timas edition indir</h1>
        <button id="download-btn">HEMEN İNDİR</button>
    </div>

    <div id="slideshow">
        <img class="slide" src="734387458_17945845812247341_8335871828247282574_n.jpg" alt="Foto 1">
        <img class="slide" src="Gemini_Generated_Image_keqebkkeqebkkeqe.jpg" alt="Foto 2">
        <img class="slide" src="images (73).jpg" alt="Foto 3">
        <img class="slide" src="Gemini_Generated_Image_p09ea5p09ea5p09e.jpg" alt="Foto 4">
        <img class="slide" src="images (74).jpg" alt="Foto 5">
    </div>

    <div id="final-screen">
        <h2>doga izmirden geldiginde cikis yapiyor.</h2>
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const downloadBtn = document.getElementById('download-btn');
        const slideshow = document.getElementById('slideshow');
        const slides = document.querySelectorAll('.slide');
        const finalScreen = document.getElementById('final-screen');
        const bgMusic = document.getElementById('bg-music');

        let currentSlide = 0;
        const slideDuration = 6000; 

        downloadBtn.addEventListener('click', () => {
            bgMusic.play().catch(e => console.log(e));
            
            startScreen.style.display = 'none';
            slideshow.style.display = 'block';

            slides[currentSlide].classList.add('active');
            
            const slideInterval = setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide++;

                if (currentSlide < slides.length) {
                    slides[currentSlide].classList.add('active');
                } else {
                    clearInterval(slideInterval);
                    setTimeout(() => {
                        slideshow.style.display = 'none';
                        finalScreen.style.display = 'block';
                    }, 1000); 
                }
            }, slideDuration);
        });
    </script>
</body>
</html>
